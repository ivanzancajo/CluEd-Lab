name: Deploy MV laboratorio

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Ref git a desplegar en la MV
        required: true
        default: develop
  push:
    branches:
      - develop
    paths:
      - backend/**
      - frontend/**
      - docker-compose.prod.yml
      - docker-compose.lab.env.example
      - deploy/**
      - scripts/deploy-mv.sh
      - .github/workflows/deploy-mv-lab.yml

permissions:
  contents: read

concurrency:
  group: deploy-mv-lab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Desplegar en MV del laboratorio
    runs-on: ubuntu-latest
    env:
      MV_HOST: ${{ vars.MV_HOST }}
      MV_PORT: ${{ vars.MV_PORT }}
      MV_USER: ${{ vars.MV_USER }}
      MV_REPO_PATH: ${{ vars.MV_REPO_PATH }}
      DEPLOY_REF: ${{ github.event.inputs.git_ref || github.ref_name }}
      MV_SSH_PRIVATE_KEY: ${{ secrets.MV_SSH_PRIVATE_KEY }}
      MV_SSH_PRIVATE_KEY_B64: ${{ secrets.MV_SSH_PRIVATE_KEY_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalizar variables de despliegue
        run: |
          trim() {
            printf '%s' "$1" | sed 's/\r$//' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//'
          }

          {
            printf 'MV_HOST=%s\n' "$(trim "${MV_HOST:-}")"
            printf 'MV_PORT=%s\n' "$(trim "${MV_PORT:-22}")"
            printf 'MV_USER=%s\n' "$(trim "${MV_USER:-}")"
            printf 'MV_REPO_PATH=%s\n' "$(trim "${MV_REPO_PATH:-}")"
            printf 'DEPLOY_REF=%s\n' "$(trim "${DEPLOY_REF:-}")"
          } >> "$GITHUB_ENV"

      - name: Validar configuracion minima
        run: |
          [[ -n "${MV_HOST:-}" ]] || { echo 'Falta la variable MV_HOST'; exit 1; }
          [[ "$MV_HOST" != *[[:space:]]* ]] || { echo 'MV_HOST contiene espacios en blanco invalidos'; exit 1; }
          [[ -n "${MV_USER:-}" ]] || { echo 'Falta la variable MV_USER'; exit 1; }
          [[ -n "${MV_REPO_PATH:-}" ]] || { echo 'Falta la variable MV_REPO_PATH'; exit 1; }
          [[ -n "${MV_SSH_PRIVATE_KEY:-}" || -n "${MV_SSH_PRIVATE_KEY_B64:-}" ]] || {
            echo 'Falta el secreto MV_SSH_PRIVATE_KEY o MV_SSH_PRIVATE_KEY_B64'
            exit 1
          }

      - name: Preparar clave SSH
        run: |
          write_candidate_key() {
            local source_kind="$1"

            case "$source_kind" in
              b64)
                printf '%s' "$MV_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519.raw 2>/dev/null || return 1
                ;;
              plain)
                printf '%s' "$MV_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519.raw
                ;;
              *)
                return 1
                ;;
            esac

            tr -d '\r' < ~/.ssh/id_ed25519.raw > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            ssh-keygen -yf ~/.ssh/id_ed25519 >/dev/null 2>&1
          }

          install -m 700 -d ~/.ssh

          rm -f ~/.ssh/id_ed25519 ~/.ssh/id_ed25519.raw
          if [[ -n "${MV_SSH_PRIVATE_KEY_B64:-}" ]] && write_candidate_key b64; then
            echo 'Usando MV_SSH_PRIVATE_KEY_B64'
          elif [[ -n "${MV_SSH_PRIVATE_KEY:-}" ]] && write_candidate_key plain; then
            echo 'Usando MV_SSH_PRIVATE_KEY'
          else
            rm -f ~/.ssh/id_ed25519 ~/.ssh/id_ed25519.raw
            echo 'No se pudo reconstruir una clave SSH valida desde MV_SSH_PRIVATE_KEY_B64 ni MV_SSH_PRIVATE_KEY.'
            echo 'Para la web de GitHub, recrea MV_SSH_PRIVATE_KEY_B64 con: base64 -w0 ~/.ssh/id_ed25519_tfg_mv_actions'
            exit 1
          fi

          rm -f ~/.ssh/id_ed25519.raw
          ssh-keyscan -p "${MV_PORT:-22}" -H "$MV_HOST" >> ~/.ssh/known_hosts

      - name: Ejecutar despliegue remoto
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -p "${MV_PORT:-22}" "${MV_USER}@${MV_HOST}" \
            bash -s -- "$DEPLOY_REF" "$MV_REPO_PATH" <<'EOF'
          set -euo pipefail

          DEPLOY_REF="$1"
          REPO_PATH="$2"

          if [[ ! -d "$REPO_PATH/.git" ]]; then
            echo "No existe un checkout git en $REPO_PATH. Haz el bootstrap manual una vez y vuelve a lanzar el workflow." >&2
            exit 1
          fi

          cd "$REPO_PATH"
          git fetch origin --prune

          if git ls-remote --exit-code --heads origin "$DEPLOY_REF" >/dev/null 2>&1; then
            git fetch origin "$DEPLOY_REF"
            git checkout --detach "origin/$DEPLOY_REF"
          else
            git checkout --detach "$DEPLOY_REF"
          fi

          bash ./scripts/deploy-mv.sh
          EOF