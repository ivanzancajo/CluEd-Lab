user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Puerto 8081 (solo localhost): proxy HTTP interno para el Cloudflare Tunnel.
  # cloudflared conecta aqui via http://localhost:8081; al ser solo loopback
  # no es accesible desde el exterior.
  server {
    listen 127.0.0.1:8081;
    server_name virtual.lab.inf.uva.es;

    location /api/ {
      proxy_pass http://127.0.0.1:4000/api/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      # El cliente llega por HTTPS via Cloudflare; cloudflared entra aqui por
      # http://localhost:8081, asi que $scheme seria 'http'. Forzamos 'https'
      # para que el backend construya URLs y valide el origen correctamente.
      proxy_set_header X-Forwarded-Proto https;
    }

    location /socket.io/ {
      proxy_pass http://127.0.0.1:4000/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 86400;
      proxy_send_timeout 86400;
      proxy_buffering off;
      proxy_request_buffering off;
    }

    location / {
      proxy_pass http://127.0.0.1:8080/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # Puerto 80: HTTPS con certificado autofirmado.
  # Acceso externo via NAT :20382 → VM:80. Los navegadores modernos con
  # HTTPS-First envian un ClientHello SSL al puerto; con plain HTTP recibian
  # ERR_SSL_PROTOCOL_ERROR. El certificado autofirmado produce advertencia de
  # seguridad en el primer acceso pero permite continuar.
  server {
    listen 80 ssl;
    listen [::]:80 ssl;
    server_name virtual.lab.inf.uva.es;

    ssl_certificate     /etc/letsencrypt/live/virtual.lab.inf.uva.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/virtual.lab.inf.uva.es/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    location /api/ {
      proxy_pass http://127.0.0.1:4000/api/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Port  20382;
    }

    location /socket.io/ {
      proxy_pass http://127.0.0.1:4000/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Port  20382;
      proxy_read_timeout 86400;
      proxy_send_timeout 86400;
      proxy_buffering off;
      proxy_request_buffering off;
    }

    location / {
      proxy_pass http://127.0.0.1:8080/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Port  20382;
    }
  }

  # Puerto 443: HTTPS con certificado autofirmado.
  # Acceso externo via NAT :20383 → VM:443.
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name virtual.lab.inf.uva.es;

    ssl_certificate     /etc/letsencrypt/live/virtual.lab.inf.uva.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/virtual.lab.inf.uva.es/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    location /api/ {
      proxy_pass http://127.0.0.1:4000/api/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Port  443;
    }

    location /socket.io/ {
      proxy_pass http://127.0.0.1:4000/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Port  443;
      proxy_read_timeout 86400;
      proxy_send_timeout 86400;
      proxy_buffering off;
      proxy_request_buffering off;
    }

    location / {
      proxy_pass http://127.0.0.1:8080/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Port  443;
    }
  }
}
