user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;
# Carga módulos dinámicos de Ubuntu (incluye ngx_stream_module)
include /etc/nginx/modules-enabled/*.conf;

events {
  worker_connections 1024;
}

# ── Detección de protocolo en el puerto interno 80 ────────────────────────────
# NAT de la UVa: external:20382 → VM:80
# El módulo stream inspecciona el primer byte para distinguir HTTP de HTTPS:
#   ""  (sin TLS) → redireccion interna en el puerto 8079 → 301 a HTTPS
#   TLS (cualquier version) → terminacion TLS interna en el puerto 8443
# Así una petición http://...20382 recibe un 301 en lugar del 400 que devuelve
# un listen ssl cuando llega trafico HTTP plano.
stream {
  map $ssl_preread_protocol $backend_addr {
    ""      "127.0.0.1:8079";   # HTTP plano → redireccion
    default "127.0.0.1:8443";   # Cualquier TLS → terminacion SSL
  }

  server {
    listen 80;
    ssl_preread           on;
    proxy_pass            $backend_addr;
    proxy_connect_timeout 5s;
    proxy_timeout         86400s;
  }
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ── Redireccion HTTP → HTTPS ───────────────────────────────────────────────
  # Recibe trafico HTTP plano enviado por el bloque stream desde el puerto 80.
  # $http_host preserva el host:puerto del navegador (p. ej.
  # virtual.lab.inf.uva.es:20382), de modo que la URL resultante mantiene el
  # puerto externo correcto.
  server {
    listen 8079;
    server_name _;
    return 301 https://$http_host$request_uri;
  }

  # ── Servidor HTTPS ─────────────────────────────────────────────────────────
  # Puerto 8443: recibe conexiones TLS desde el bloque stream (20382 externo).
  # Puerto 443:  recibe conexiones TLS directas (20383 externo via NAT).
  server {
    listen 8443 ssl;
    listen 443 ssl;
    server_name virtual.lab.inf.uva.es;

    ssl_certificate     /etc/letsencrypt/live/virtual.lab.inf.uva.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/virtual.lab.inf.uva.es/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/ {
      proxy_pass http://127.0.0.1:4000/api/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /socket.io/ {
      proxy_pass http://127.0.0.1:4000/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 86400;
      proxy_send_timeout 86400;
      proxy_buffering off;
      proxy_request_buffering off;
    }

    location / {
      proxy_pass http://127.0.0.1:8080/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
