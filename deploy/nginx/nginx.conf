user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;

  # Eduroam/WebSocket: Connection: upgrade only for real WS upgrades,
  # falls back to close for HTTP long-polling (avoids 502 on corporate firewalls).
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # HTTPS con proxy inverso (SCRUM-156, 157, 158, 159)
  # Escucha en todos los puertos posibles segun el modelo NAT de la UVa:
  #   external:20382 → VM:80   o   external:20382 → VM:20382
  #   external:20383 → VM:443  o   external:20383 → VM:20383
  server {
    listen 80 ssl;
    listen 20382 ssl;
    listen 443 ssl;
    listen 20383 ssl;
    server_name virtual.lab.inf.uva.es;

    # Certificados SSL (SCRUM-158)
    ssl_certificate     /etc/letsencrypt/live/virtual.lab.inf.uva.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/virtual.lab.inf.uva.es/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Proxy inverso API REST (SCRUM-157)
    location /api/ {
      proxy_pass http://127.0.0.1:4000/api/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;               # SCRUM-159
      proxy_set_header X-Real-IP         $remote_addr;        # SCRUM-159
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for; # SCRUM-159
      proxy_set_header X-Forwarded-Proto https;               # SCRUM-159
    }

    # Proxy inverso Socket.IO WebSocket (SCRUM-157)
    location /socket.io/ {
      proxy_pass http://127.0.0.1:4000/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;               # SCRUM-159
      proxy_set_header X-Real-IP         $remote_addr;        # SCRUM-159
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for; # SCRUM-159
      proxy_set_header X-Forwarded-Proto https;               # SCRUM-159
      proxy_read_timeout 86400;
      proxy_send_timeout 86400;
      proxy_buffering off;
      proxy_request_buffering off;
    }

    # Frontend SPA (SCRUM-157)
    location / {
      proxy_pass http://127.0.0.1:8080/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;               # SCRUM-159
      proxy_set_header X-Real-IP         $remote_addr;        # SCRUM-159
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for; # SCRUM-159
      proxy_set_header X-Forwarded-Proto https;               # SCRUM-159
    }
  }
}
