services:
  backend:
    image: tfg-backend:prod
    build:
      context: ./backend
      target: prod
    container_name: cluedo_backend_prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./backend/.env
    ports:
      - target: 4000
        published: "${BACKEND_PUBLISHED_PORT:-4000}"
        host_ip: "${BACKEND_HOST_IP:-0.0.0.0}"
        protocol: tcp

  frontend:
    image: tfg-frontend:prod
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_URL: /api
    container_name: cluedo_frontend_prod
    depends_on:
      - backend
    ports:
      - target: 80
        published: "${FRONTEND_PUBLISHED_PORT:-80}"
        host_ip: "${FRONTEND_HOST_IP:-0.0.0.0}"
        protocol: tcp
      - target: 20382
        published: 20382
        host_ip: "${FRONTEND_HOST_IP:-0.0.0.0}"
        protocol: tcp

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    network_mode: host
    restart: unless-stopped
    profiles:
      - tunnel